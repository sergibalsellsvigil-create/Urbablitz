<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Clan | Urbanblitz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="variables.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    
    <style>
        /* Fondo con overlay oscuro y la imagen de marca */
        .auth-wrapper {
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('img/herooso.png');
            background-size: cover;
            background-position: center;
        }

        .login-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .login-header h2 {
            font-size: 1.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--blanco-puro);
            margin-bottom: 10px;
        }

        .login-header p {
            color: var(--texto-secundario);
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            color: var(--rojo-corporativo);
        }

        .form-group input {
            width: 100%;
            background: #111;
            border: 1px solid var(--gris-borde);
            padding: 15px;
            color: white;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--rojo-corporativo);
            background: #151515;
        }

        .btn-login-submit {
            width: 100%;
            background: var(--rojo-corporativo);
            color: white;
            border: none;
            padding: 18px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        .btn-login-submit:hover {
            box-shadow: 0 0 20px var(--rojo-corporativo);
            transform: translateY(-2px);
        }

        .login-footer-links {
            margin-top: 30px;
            text-align: center;
            font-size: 0.85rem;
        }

        .login-footer-links a {
            color: var(--blanco-puro);
            text-decoration: underline;
            opacity: 0.7;
        }

        .login-footer-links a:hover {
            opacity: 1;
            color: var(--rojo-corporativo);
        }
    </style>
</head>
<body>

    <header class="main-header">
        <nav class="nav-container">
            <h1 class="logo">
                <img src="img/header-logo.png" alt="" class="logo-icon">
                URBANBLITZ
            </h1>
            <ul class="nav-list">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="historia.html">Quiénes somos</a></li>
                <li><a href="tienda.html">Tienda</a></li>
                <li><a href="contacto.html">Contacto</a></li>
                <li><a href="pagina_registro.html" class="btn-register-glow">ÚNETE AL CLAN</a></li>
            </ul>
        </nav>
    </header>

    <main class="auth-wrapper">
        <article class="auth-card">
            <header class="login-header">
                <h2>Identificación</h2>
                <p>Bienvenido de nuevo al Clan Urbanblitz.</p>
            </header>

            <form action="#">
                <div class="form-group">
                    <label for="email">Email del Usuario</label>
                    <input type="email" id="email" placeholder="tu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-login-submit">Entrar al Sistema</button>
            </form>

            <footer class="login-footer-links">
                <a href="pagina_registro.html">Crear Cuenta</a>
                <span style="color: var(--gris-borde); margin: 0 10px;">|</span>
                <a href="#">¿Olvidaste la clave?</a>
            </footer>
        </article>
    </main>

    <footer class="main-footer" style="padding: 30px 20px;">
        <section style="text-align: center; font-size: 0.8rem; opacity: 0.6;">
            <p>© 2026 Urbanblitz — Built for the streets. All Rights Reserved.</p>
        </section>
    </footer>

</body>
</html>
